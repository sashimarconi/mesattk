<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Pedidos</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background: #f5f7fb; color: #0f172a; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 40px; }
    h1 { margin: 0 0 16px; font-size: 24px; }
    .row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; }
    .label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .value { font-size: 28px; font-weight: 700; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    button { border: 1px solid #d1d5db; background: #fff; border-radius: 10px; padding: 8px 12px; cursor: pointer; }
    button.active { background: #0f766e; color: #fff; border-color: #0f766e; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #eef2f7; text-align: left; font-size: 13px; }
    th { font-size: 12px; color: #475569; background: #f8fafc; }
    tr:last-child td { border-bottom: 0; }
    .status { font-weight: 600; }
    .status-paid, .status-approved { color: #047857; }
    .status-waiting_payment, .status-pending { color: #b45309; }
    .status-cancelled, .status-refused { color: #b91c1c; }
    .muted { color: #64748b; }
    .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; display: none; }
    @media (max-width: 900px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin de Pedidos</h1>
    <div id="error" class="error"></div>

    <div class="row">
      <div class="card"><div class="label">Pedidos Gerados</div><div id="generatedCount" class="value">0</div></div>
      <div class="card"><div class="label">Pedidos Pagos</div><div id="paidCount" class="value">0</div></div>
      <div class="card"><div class="label">Pedidos Pendentes</div><div id="pendingCount" class="value">0</div></div>
    </div>

    <div class="toolbar">
      <button id="f-all" class="active">Todos</button>
      <button id="f-paid">Pagos</button>
      <button id="f-pending">Pendentes</button>
      <button id="refresh">Atualizar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Valor</th>
          <th>Status</th>
          <th>Criado em</th>
          <th>Pago em</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="6" class="muted">Carregando pedidos...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const state = { orders: [], filter: 'all' };

    function money(cents) {
      return (Number(cents || 0) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function dateTime(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('pt-BR');
    }

    function isPaid(status) {
      return status === 'paid' || status === 'approved';
    }

    function isPending(status) {
      return status === 'waiting_payment' || status === 'pending';
    }

    function setError(message) {
      const box = document.getElementById('error');
      if (!message) {
        box.style.display = 'none';
        box.textContent = '';
        return;
      }

      box.style.display = 'block';
      box.textContent = message;
    }

    function renderTable() {
      const body = document.getElementById('ordersBody');
      let rows = state.orders;

      if (state.filter === 'paid') {
        rows = rows.filter((order) => isPaid(order.status));
      } else if (state.filter === 'pending') {
        rows = rows.filter((order) => isPending(order.status));
      }

      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="6" class="muted">Nenhum pedido encontrado.</td></tr>';
        return;
      }

      body.innerHTML = rows.map((order) => {
        const statusClass = `status status-${String(order.status || '').toLowerCase()}`;
        return `
          <tr>
            <td>${order.id ?? '-'}</td>
            <td>
              <div>${order.customerName || '-'}</div>
              <div class="muted">${order.customerEmail || ''}</div>
            </td>
            <td>${money(order.amount)}</td>
            <td class="${statusClass}">${order.status || '-'}</td>
            <td>${dateTime(order.createdAt)}</td>
            <td>${dateTime(order.paidAt)}</td>
          </tr>
        `;
      }).join('');
    }

    function setFilter(filter) {
      state.filter = filter;
      document.getElementById('f-all').classList.toggle('active', filter === 'all');
      document.getElementById('f-paid').classList.toggle('active', filter === 'paid');
      document.getElementById('f-pending').classList.toggle('active', filter === 'pending');
      renderTable();
    }

    async function loadOrders() {
      setError('');
      try {
        const response = await fetch('/api/admin-orders?limit=200');
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Não foi possível carregar os pedidos.');
        }

        state.orders = data.orders || [];

        document.getElementById('generatedCount').textContent = data.summary?.generatedCount ?? state.orders.length;
        document.getElementById('paidCount').textContent = data.summary?.paidCount ?? state.orders.filter((o) => isPaid(o.status)).length;
        document.getElementById('pendingCount').textContent = data.summary?.pendingCount ?? state.orders.filter((o) => isPending(o.status)).length;

        renderTable();
      } catch (error) {
        setError(error.message || 'Erro inesperado ao carregar pedidos.');
        document.getElementById('ordersBody').innerHTML = '<tr><td colspan="6" class="muted">Falha ao carregar pedidos.</td></tr>';
      }
    }

    document.getElementById('f-all').addEventListener('click', () => setFilter('all'));
    document.getElementById('f-paid').addEventListener('click', () => setFilter('paid'));
    document.getElementById('f-pending').addEventListener('click', () => setFilter('pending'));
    document.getElementById('refresh').addEventListener('click', loadOrders);

    loadOrders();
  </script>
</body>
</html>
